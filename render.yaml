services:
  - type: web
    name: careerpulse-growth-path
    plan: free
    env: python
    rootDir: stitch_career_growth_assistant
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: GEMINI_API_KEY
        sync: false
        placeholder: "Your Google Gemini API Key for chatbot integration"
