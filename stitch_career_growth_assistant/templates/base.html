<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{% block title %}CareerPulse{% endblock %}</title>
    <script src="{{ url_for('static', filename='tailwind-cdn.js') }}"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                        "inverse-on-surface": "#f3f0f2",

                        "on-error-container": "#93000a",
                        "primary-fixed-dim": "#bec6e0",
                        "surface-tint": "#565e74",
                        "error-container": "#ffdad6",
                        "on-primary-fixed": "#131b2e",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed": "#002113",
                        "surface-container-highest": "#e4e2e4",
                        "surface-variant": "#e4e2e4",
                        "tertiary-fixed": "#6ffbbe",
                        "tertiary": "#000000",
                        "primary": "#000000",
                        "background": "#fcf8fa",
                        "on-error": "#ffffff",
                        "inverse-surface": "#303032",
                        "on-secondary-fixed-variant": "#003ea8",
                        "on-surface": "#1b1b1d",
                        "surface-dim": "#dcd9db",
                        "secondary-container": "#316bf3",
                        "inverse-primary": "#bec6e0",
                        "outline-variant": "#c6c6cd",
                        "on-tertiary-fixed-variant": "#005236",
                        "on-tertiary-container": "#009668",
                        "secondary-fixed": "#dbe1ff",
                        "on-secondary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "surface-container": "#f0edef",
                        "on-background": "#1b1b1d",
                        "on-secondary-container": "#fefcff",
                        "on-primary": "#ffffff",
                        "primary-container": "#131b2e",
                        "surface": "#fcf8fa",
                        "on-primary-fixed-variant": "#3f465c",
                        "tertiary-container": "#002113",
                        "error": "#ba1a1a",
                        "secondary": "#0051d5",
                        "outline": "#76777d",
                        "primary-fixed": "#dae2fd",
                        "surface-container-low": "#f6f3f5",
                        "on-primary-container": "#7c839b",
                        "secondary-fixed-dim": "#b4c5ff",
                        "on-surface-variant": "#45464d"
                    },
                    "fontFamily": {
                        "h1": ["Inter"],
                        "label-caps": ["Inter"],
                        "body-md": ["Inter"],

    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #F8FAFC;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Global Dark Mode Overrides */
        html.dark body { background-color: #0f172a !important; color: #f1f5f9 !important; }
        html.dark aside, html.dark header, html.dark .bg-white { background-color: #1e293b !important; border-color: #334155 !important; color: #f1f5f9 !important; }
        html.dark .text-slate-900 { color: #f8fafc !important; }
        html.dark .text-slate-700, html.dark .text-slate-800 { color: #cbd5e1 !important; }
        html.dark .text-slate-600, html.dark .text-slate-500, html.dark .text-slate-400 { color: #cbd5e1 !important; }
        html.dark .bg-slate-50, html.dark .bg-slate-100 { background-color: #334155 !important; }
        html.dark .border-slate-200, html.dark .border-slate-100 { border-color: #334155 !important; }
        html.dark input, html.dark textarea, html.dark select { background-color: #0f172a !important; color: #f8fafc !important; border-color: #334155 !important; }
        html.dark .hover\:bg-slate-50:hover, html.dark .hover\:bg-slate-100:hover { background-color: #475569 !important; }
    </style>
    <script>
        // Apply theme on initial load to prevent flicker
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            document.documentElement.classList.remove('light');
        } else {
            document.documentElement.classList.add('light');
            document.documentElement.classList.remove('dark');
        }

        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                html.classList.add('light');
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.remove('light');
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        const SERVER_DB_UUID = "{{ user.db_uuid if user else '' }}";

        window.addEventListener('DOMContentLoaded', () => {
            const localUUID = localStorage.getItem('db_uuid');
            const hasCustomData = localStorage.getItem('user_data_saved') === 'true';

            if (SERVER_DB_UUID && localUUID !== SERVER_DB_UUID) {
                if (hasCustomData) {
                    const payload = {
                        tasks: JSON.parse(localStorage.getItem('stored_tasks') || '[]'),
                        jobs: JSON.parse(localStorage.getItem('stored_jobs') || '[]'),
                        events: JSON.parse(localStorage.getItem('stored_events') || '[]'),
                        chat_messages: JSON.parse(localStorage.getItem('stored_chat_messages') || '[]'),
                        study_sessions: JSON.parse(localStorage.getItem('stored_study_sessions') || '[]')
                    };

                    fetch('/api/restore', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            localStorage.setItem('db_uuid', SERVER_DB_UUID);
                            window.location.reload();
                        } else {
                            console.error('Failed to restore database:', data.message);
                        }
                    })
                    .catch(error => {
                        console.error('Error synchronizing database:', error);
                    });
                    return;
                } else {
                    capturePageData();
                    localStorage.setItem('db_uuid', SERVER_DB_UUID);
                    localStorage.setItem('user_data_saved', 'true');
                }
            } else {
                capturePageData();
            }
        });

        function capturePageData() {
            const roadmapElem = document.getElementById('roadmap-data');
            if (roadmapElem) {
                try {
                    const tasks = JSON.parse(roadmapElem.textContent);
                    localStorage.setItem('stored_tasks', JSON.stringify(tasks));
                } catch (e) { console.error('Error parsing roadmap tasks:', e); }
            }

            const jobsElem = document.getElementById('applications-data');
            if (jobsElem) {
                try {
                    const jobs = JSON.parse(jobsElem.textContent);
                    localStorage.setItem('stored_jobs', JSON.stringify(jobs));
                } catch (e) { console.error('Error parsing jobs:', e); }
            }

            const eventsElem = document.getElementById('calendar-data');
            if (eventsElem) {
                try {
                    const events = JSON.parse(eventsElem.textContent);
                    localStorage.setItem('stored_events', JSON.stringify(events));
                } catch (e) { console.error('Error parsing events:', e); }
            }

            const chatbotElem = document.getElementById('chatbot-data');
            if (chatbotElem) {
                try {
                    const messages = JSON.parse(chatbotElem.textContent);
                    localStorage.setItem('stored_chat_messages', JSON.stringify(messages));
                } catch (e) { console.error('Error parsing chatbot messages:', e); }
            }

            const sessionsElem = document.getElementById('study-sessions-data');
            if (sessionsElem) {
                try {
                    const sessions = JSON.parse(sessionsElem.textContent);
                    localStorage.setItem('stored_study_sessions', JSON.stringify(sessions));
                } catch (e) { console.error('Error parsing study sessions:', e); }
            }
        }
    </script>
</head>
<body class="font-body-md text-on-background bg-background">
    <!-- SideNavBar -->

            <div class="flex items-center gap-3 mb-6">
                <div class="w-10 h-10 bg-secondary rounded-lg flex items-center justify-center">
                    <span class="material-symbols-outlined text-white" data-icon="rocket_launch">rocket_launch</span>
                </div>
                <div>
                    <h2 class="text-secondary font-black leading-tight">CareerPulse</h2>
                    <p class="text-[10px] uppercase tracking-widest text-slate-400">Growth Path</p>
                </div>
            </div>
        </div>

            <a href="{{ url_for('roadmap') }}" class="flex items-center gap-3 px-4 py-3 rounded-lg mx-2 my-1 transition-transform duration-200 hover:translate-x-1 {% if request.endpoint == 'roadmap' %}bg-slate-50 text-secondary border-r-4 border-secondary{% else %}text-slate-600 hover:bg-slate-50{% endif %}">
                <span class="material-symbols-outlined" data-icon="map">map</span>

            </a>
            <a href="{{ url_for('progress') }}" class="flex items-center gap-3 px-4 py-3 rounded-lg mx-2 my-1 transition-transform duration-200 hover:translate-x-1 {% if request.endpoint == 'progress' %}bg-slate-50 text-secondary border-r-4 border-secondary{% else %}text-slate-600 hover:bg-slate-50{% endif %}">
                <span class="material-symbols-outlined" data-icon="trending_up">trending_up</span>
                <span>Progress</span>
            </a>
            <a href="{{ url_for('applications') }}" class="flex items-center gap-3 px-4 py-3 rounded-lg mx-2 my-1 transition-transform duration-200 hover:translate-x-1 {% if request.endpoint == 'applications' %}bg-slate-50 text-secondary border-r-4 border-secondary{% else %}text-slate-600 hover:bg-slate-50{% endif %}">
                <span class="material-symbols-outlined" data-icon="work">work</span>
                <span>Applications</span>
            </a>
            <a href="{{ url_for('calendar') }}" class="flex items-center gap-3 px-4 py-3 rounded-lg mx-2 my-1 transition-transform duration-200 hover:translate-x-1 {% if request.endpoint == 'calendar' %}bg-slate-50 text-secondary border-r-4 border-secondary{% else %}text-slate-600 hover:bg-slate-50{% endif %}">
                <span class="material-symbols-outlined" data-icon="calendar_today">calendar_today</span>
                <span>Calendar</span>
            </a>
            <a href="{{ url_for('timer') }}" class="flex items-center gap-3 px-4 py-3 rounded-lg mx-2 my-1 transition-transform duration-200 hover:translate-x-1 {% if request.endpoint == 'timer' %}bg-slate-50 text-secondary border-r-4 border-secondary{% else %}text-slate-600 hover:bg-slate-50{% endif %}">
                <span class="material-symbols-outlined" data-icon="timer">timer</span>
                <span>Timer</span>
            </a>
            <a href="{{ url_for('chatbot') }}" class="flex items-center gap-3 px-4 py-3 rounded-lg mx-2 my-1 transition-transform duration-200 hover:translate-x-1 {% if request.endpoint == 'chatbot' %}bg-slate-50 text-secondary border-r-4 border-secondary{% else %}text-slate-600 hover:bg-slate-50{% endif %}">
                <span class="material-symbols-outlined" data-icon="smart_toy">smart_toy</span>
                <span>Chatbot</span>
            </a>
        </nav>
        <div class="mt-auto p-4 border-t border-slate-100">
            <!-- Footer removed as requested -->
        </div>
    </aside>

    <!-- Main Content Wrapper -->
    <div class="ml-64 flex flex-col min-h-screen">
        <!-- TopAppBar -->
        <header class="flex justify-between items-center px-8 h-16 w-full sticky top-0 z-50 bg-[#F8FAFC] border-b border-slate-200 shadow-sm font-['Inter'] antialiased">
            <div class="flex items-center gap-4 flex-1">
                <div class="relative w-full max-w-md hidden">
                    <!-- Search bar removed as requested -->
                </div>
            </div>
            <div class="flex items-center gap-6">
                <div class="flex gap-4">
                    <button onclick="toggleTheme()" class="p-2 text-slate-500 hover:bg-slate-100 rounded-full transition-colors relative" title="Toggle Theme">
                        <span class="material-symbols-outlined dark:hidden" data-icon="dark_mode">dark_mode</span>
                        <span class="material-symbols-outlined hidden dark:block" data-icon="light_mode">light_mode</span>
                    </button>
                    <button class="p-2 text-slate-500 hover:bg-slate-100 rounded-full transition-colors relative">
                        <span class="material-symbols-outlined" data-icon="notifications">notifications</span>
                        <span class="absolute top-2 right-2 w-2 h-2 bg-error rounded-full"></span>
                    </button>
                </div>
                <!-- User Profile removed as requested -->
            </div>
        </header>

        {% block content %}{% endblock %}
    </div>
</body>
</html>
